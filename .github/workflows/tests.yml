name: CI

on:
  push:
    branches: [ "**" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Check syntax (compile all modules)
        run: python -m compileall -q .

      - name: Check imports
        run: |
          python -c "import core.theorem"
          python -c "import core.expression"
          python -c "import core.knowledge"
          python -c "import core.engine"
          python -c "import core.explainer"
          python -c "import domains.geometry"
          python -c "import domains.physics"
          python -c "import domains.electricity"
          python -c "import ui.console"
          python -c "import main"

      - name: Run tests
        run: python -m pytest -v
